version: "3.9"

services:
  whoop-service:
    build: .
    container_name: whoop-service
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./cache:/cache
      - ./secrets:/secrets
    networks:
      - openclaw_internal
    # Service is internal-only. Do not publish ports on VPS.
    # OpenClaw should call http://whoop-service:8001 inside Docker network.

networks:
  openclaw_internal:
    driver: bridge
    internal: true
