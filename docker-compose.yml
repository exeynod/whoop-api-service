version: "3.9"

services:
  whoop-service:
    build: .
    container_name: whoop-service
    user: "1000:1000"
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./cache:/cache
      - ./secrets:/secrets
    networks:
      - openclaw_whoop_api
    # Service is internal-only. Do not publish ports on VPS.
    # OpenClaw should call http://whoop-service:8001 inside Docker network.

networks:
  openclaw_whoop_api:
    name: openclaw_whoop_api
    external: true
