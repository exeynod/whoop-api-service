services:
  whoop-service:
    build: .
    container_name: whoop-service
    user: "1000:1000"
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./cache:/cache
      - ./secrets:/secrets
    networks:
      - nanobot-home_default
    # Internal-only: no published ports.
    # Nanobot agents reach it at http://whoop-service:8001 inside the network.

networks:
  nanobot-home_default:
    external: true
